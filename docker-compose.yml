services:
  db:
    image: postgres:15-alpine
    container_name: gamevault-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gamevault
    ports:
      - "5433:5432"
    volumes:
      - gamevault-data:/var/lib/postgresql/data

volumes:
  gamevault-data: